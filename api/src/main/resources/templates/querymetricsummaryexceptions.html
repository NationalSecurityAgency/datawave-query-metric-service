<html xmlns:th="http:/>/www.thymeleaf.org">
<!--/*
    The HTML page for QueryMetricsSummaryResponse when there are exceptions
*/-->
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <title>DATAWAVE - Query Metrics Summary</title>
    <link rel="stylesheet" type="text/css" href="/querymetric/css/screen.css" media="screen">
</head>
<body>
    <h1>Query Metrics Summary</h1>
    <b>EXCEPTIONS:</b>
    <br>
    <div th:each="exception : ${exceptions}">
        <span th:text="${exception} + ', ' + ${schema}"></span>
        <br>
    </div>
</body>
</html>
